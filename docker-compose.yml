services:
  postgres:
    image: postgres:16-alpine
    container_name: controle-transporte-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-controle_transporte}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD deve ser informado}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
